<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 1 API Tester</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; margin: 0; padding: 20px; display: flex; gap: 20px; }
        .container { flex: 1; background: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1, h2 { color: #61dafb; margin-top: 0; }
        button { background: #61dafb; color: #000; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; width: 100%; transition: background 0.2s; }
        button:hover { background: #4fa8c7; }
        pre { background: #000; padding: 15px; border-radius: 6px; overflow-x: auto; color: #a6e22e; font-size: 14px; min-height: 200px; white-space: pre-wrap; }
        .token-box { background: #3d3d3d; padding: 10px; border-radius: 4px; font-family: monospace; word-break: break-all; margin-bottom: 20px; font-size: 12px; color: #ffd700; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 4px; color: #aaa; }
        .input-group input { width: 100%; padding: 8px; box-sizing: border-box; border-radius: 4px; border: 1px solid #444; background: #1e1e1e; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Phase 1 API Tester</h1>
        <p>Ensure your server is running (`node server.js`) before clicking these buttons!</p>

        <div class="token-box">
            <strong>Current Auth Token:</strong><br>
            <span id="token-display">None. Please Register or Login first.</span>
        </div>

        <h2>1. Register & Login</h2>
        <div class="input-group">
            <label>Email</label>
            <input type="text" id="email" value="admin2@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="text" id="password" value="Password123">
        </div>
        
        <button onclick="testRegister()">Test POST /register</button>
        <button onclick="testLogin()">Test POST /login</button>
        <button onclick="testBusinessSetup()">Test POST /business-setup (Requires Token)</button>

        <h2>2. Password Reset Flow</h2>
        <button onclick="testForgotPassword()">Test POST /forgot-password</button>
        
        <div class="input-group" style="margin-top: 10px;">
            <label>Enter OTP (Check VS Code Terminal)</label>
            <input type="text" id="otp" placeholder="Enter 6-digit OTP here">
        </div>
        <button onclick="testVerifyOtp()">Test POST /verify-otp</button>
        <button onclick="testResetPassword()">Test POST /reset-password</button>

    </div>

    <div class="container" style="flex: 2;">
        <h2>Server Response</h2>
        <pre id="response">Responses will appear here...</pre>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api/auth';
        let authToken = '';

        function logResponse(data) {
            document.getElementById('response').innerText = JSON.stringify(data, null, 2);
            // Auto-save token if server returns one
            if (data.token) {
                authToken = data.token;
                document.getElementById('token-display').innerText = authToken;
            }
        }

        function logError(err) {
            document.getElementById('response').innerText = 'ERROR: Is your server running?\n\n' + err.message;
        }

        async function makeRequest(endpoint, payload, requireAuth = false) {
            try {
                document.getElementById('response').innerText = 'Loading...';
                
                const headers = { 'Content-Type': 'application/json' };
                if (requireAuth && authToken) {
                    headers['Authorization'] = `Bearer ${authToken}`;
                }

                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                logResponse(data);
            } catch (err) {
                logError(err);
            }
        }

        function testRegister() {
            makeRequest('/register', {
                full_name: "Test Admin",
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone_number: "9876543210"
            });
        }

        function testLogin() {
            makeRequest('/login', {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
        }

        function testBusinessSetup() {
            if (!authToken) {
                alert("You need a token first! Click Register or Login.");
                return;
            }
            makeRequest('/business-setup', {
                business_name: "Awesome CRM Ltd",
                registration_no: "REG-999",
                gst_no: "GST-999",
                country: "India",
                state: "Maharashtra",
                city: "Mumbai",
                pincode: "400001"
            }, true);
        }

        function testForgotPassword() {
            makeRequest('/forgot-password', {
                email: document.getElementById('email').value
            });
        }

        function testVerifyOtp() {
            const otp = document.getElementById('otp').value;
            if (!otp) { alert("Please enter the OTP from your terminal!"); return; }
            makeRequest('/verify-otp', {
                email: document.getElementById('email').value,
                otp: otp
            });
        }

        function testResetPassword() {
            makeRequest('/reset-password', {
                email: document.getElementById('email').value,
                newPassword: "NewPassword456!"
            });
        }
    </script>
</body>
</html>
